name: Build and Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --quiet pip --upgrade
          pip install --quiet -r requirements.txt
          pip install --quiet pyinstaller pywebview

      - name: Build app
        run: |
          source .venv/bin/activate
          ./build_app.sh

      - name: Create DMG
        run: |
          hdiutil create -volname "Email Assistant" -srcfolder "dist/Email Assistant.app" -ov -format UDZO "dist/EmailAssistant.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmailAssistant
          path: dist/EmailAssistant.dmg

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Email Assistant v${{ steps.version.outputs.VERSION }}
          files: dist/EmailAssistant.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}