name: Smoke CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Ruff correctness check
        run: ruff check .

      - name: Compile Python entrypoints
        run: |
          python -m py_compile \
            main.py launcher.py \
            app/__init__.py app/runtime.py app/task_runner.py app/updater.py \
            app/routes/*.py app/services/*.py \
            modules/*.py modules/db/*.py modules/imap/*.py modules/knowledge/*.py

      - name: Check frontend syntax
        run: node --check static/js/app.js

      - name: Build developer docs
        run: sphinx-build -b html docs docs/_build/html
